name: CI Workflow
on:
  push:

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Build docker image
        run: docker build --tag ensemble-transposer .
      - name: Check code formatting
        run: docker run --rm --tty ensemble-transposer npm run lint
      - name: Run unit tests
        run: |
          touch .env
          docker run --rm --tty --env-file=.env ensemble-transposer npm test
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    needs:
      - test
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Set Docker tag
        id: docker_tag
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          if [[ "$BRANCH" == refs/tags/* ]]; then
            echo "tag=$BRANCH" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi
      - name: Build the Docker image
        env:
          DOCKER_TAG: ${{ steps.docker_tag.outputs.tag }}
        run: docker build . -t us-docker.pkg.dev/moz-fx-data-artifacts-prod/ensemble-transposer/ensemble-transposer:$DOCKER_TAG
      - name: Push Docker image to GAR
        uses: mozilla-it/deploy-actions/docker-push@4784cb70739a4f32ce010921f60fb1ebbc791a38  # v6.2.2
        with:
          project_id: moz-fx-data-artifacts-prod
          image_tags: us-docker.pkg.dev/moz-fx-data-artifacts-prod/ensemble-transposer/ensemble-transposer:${{ steps.docker_tag.outputs.tag }}
          workload_identity_pool_project_number: ${{ vars.GCPV2_WORKLOAD_IDENTITY_POOL_PROJECT_NUMBER }}
          service_account_name: ensemble-transposer
